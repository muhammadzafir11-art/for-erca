<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Erca ❤️</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        font-family: 'Segoe UI', sans-serif;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
    }

    .container {
        text-align: center;
        animation: fadeIn 2s ease-in-out;
    }

    h1 {
        font-size: 3em;
        margin-bottom: 10px;
    }

    p {
        font-size: 1.2em;
        opacity: 0.8;
    }

    button {
        margin-top: 20px;
        padding: 12px 25px;
        border: none;
        border-radius: 25px;
        background: #ff4b7d;
        color: white;
        font-size: 1em;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #ff1e5a;
        transform: scale(1.1);
    }

    #message {
        margin-top: 30px;
        font-size: 1.5em;
        opacity: 0;
        transition: 1s;
    }

    @keyframes fadeIn {
        from {opacity: 0; transform: translateY(20px);}
        to {opacity: 1; transform: translateY(0);}
    }

    /* Floating hearts */
    .heart {
        position: absolute;
        color: #ff4b7d;
        animation: float 5s linear infinite;
    }

    @keyframes float {
        0% {
            transform: translateY(100vh) scale(0.5);
            opacity: 0;
        }
        50% {
            opacity: 1;
        }
        100% {
            transform: translateY(-10vh) scale(1.2);
            opacity: 0;
        }
    }
</style>
</head>

<body>

<div class="container">
    <h1>Hai erca ❤️</h1>
    <p>Aku punya sesuatu buat kamu...</p>
    <button onclick="showLove()">Klik di sini 💌</button>

    <div id="message"></div>
</div>

<script>
function showLove() {
    const msg = document.getElementById("message");

    msg.innerHTML = "maaf kalau udah berlebihan<br><br>maaf untuk segala kekurangan ku<br><br>i really love u ❤️";
    msg.style.opacity = 1;
}

// generate floating hearts
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = Math.random() * 20 + 10 + "px";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 5000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
